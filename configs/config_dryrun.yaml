# Dry-run overlay — proves pipeline plumbing end-to-end on MPS in <2 min.
# Inherits intent from config_novel.yaml but overrides model names and sizes
# so the dry run doesn't download multi-GB weights.
#
# Note: Substituting a tiny detector here is a DRY-RUN-ONLY concession to
# finish plumbing validation quickly. Real experiments (PRD §6) must use
# config_novel.yaml — PubMedBERT, BioMedLM, Phi-3.5, Llama-3.2 untouched.

runtime:
  device: "mps"
  dtype: "bfloat16"
  num_workers: 2
  pin_memory: false
  persistent_workers: false
  seed: 42

paths:
  project_root: "."
  data_dir: "data/processed"
  train_csv: "data/processed/train.csv"
  val_csv:   "data/processed/val.csv"
  test_csv:  "data/processed/test.csv"
  transfer_test_csv: "data/processed/transfer_test.csv"
  experiments_dir: "experiments"
  metrics_dir: "experiments/metrics"
  plots_dir: "experiments/plots"
  round_data_dir: "experiments/round_data"
  checkpoints_dir: "experiments/checkpoints"

data:
  source: "synthetic"        # bypass HuggingFace streaming
  max_real_samples: 200
  min_words: 8
  val_ratio: 0.1
  test_ratio: 0.1
  med_mmhl_fakes_path: null

generator:
  model_name: "sshleifer/tiny-gpt2"    # dry-run stand-in for BioMedLM
  dtype: "float32"                      # tiny model — fp32 is fine
  gradient_checkpointing: false
  per_device_batch_size: 2
  grad_accum_steps: 2
  epochs: 1
  lr: 5.0e-5
  max_length: 64
  offload_when_idle: true
  output_dir: "experiments/checkpoints/generator"
  prompt_template: "Abstract about {topic}:"

detector:
  model_name: "sshleifer/tiny-distilbert-base-uncased-finetuned-sst-2-english"  # dry-run stand-in for PubMedBERT (ships fast tokenizer)
  dtype: "float32"
  batch_size: 8
  max_length: 64
  epochs: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.0
  output_dir: "experiments/checkpoints/detector"

agent:
  model_name: "sshleifer/tiny-gpt2"     # dry-run stand-in for Phi-3.5
  dtype: "float32"
  attn_implementation: "eager"
  max_new_tokens: 32
  temperature: 0.8
  top_p: 0.95
  lora:
    r: 4
    alpha: 8
    dropout: 0.0
    target_modules: ["c_attn"]          # tiny-gpt2 module
  rewrite_prompt: "Rewrite: {fake_abstract}\nRewritten:"
  output_dir: "experiments/checkpoints/agent"

seqgan:
  vocab_size: 1000
  embedding_dim: 32
  hidden_dim: 64
  seq_length: 32
  batch_size: 8
  pretrain_epochs: 1
  adv_epochs: 1
  output_dir: "experiments/checkpoints/seqgan"

transfer_attacker:
  model_name: "sshleifer/tiny-gpt2"     # dry-run stand-in for Llama-3.2
  dtype: "float32"
  attn_implementation: "eager"
  n_fakes: 20
  max_new_tokens: 32
  temperature: 0.8
  top_p: 0.95

loop:
  num_rounds: 2
  fake_pool_size: 20
  hard_fraction: 0.5
  clear_vram_between_steps: true

metrics:
  compute_bertscore: false    # skip to keep dry-run dependency-light
  compute_perplexity: false
  bertscore_model: "prajjwal1/bert-tiny"

logging:
  level: "INFO"
  log_to_file: true
  log_path: "experiments/run_dryrun.log"
